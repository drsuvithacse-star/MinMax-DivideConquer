<!DOCTYPE html>
<html>
<head>
<title>Divide and Conquer - Find Max & Min</title>

<style>

body{
    font-family:Arial;
    text-align:center;
    background:#f0f2f5;
}

h1{
    color:#333;
}

.container{
    margin-top:30px;
}

.array-box{
    display:inline-block;
    padding:15px;
    margin:8px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    transition:0.5s;
}

.highlight{
    background:#ffd54f !important;
    transform:scale(1.1);
}

.result{
    margin-top:30px;
    font-size:24px;
    font-weight:bold;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#2196f3;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0b7dda;
}

</style>

</head>

<body>

<h1>Divide and Conquer Visualization</h1>

<h2>Finding Maximum and Minimum</h2>

<button onclick="start()">Start Animation</button>

<div class="container" id="visual"></div>

<div class="result" id="result"></div>


<script>

let arr=[25,10,55,42,90,3,67,12];

function sleep(ms){
return new Promise(resolve=>setTimeout(resolve,ms));
}

function drawArray(subArr,id){

let div=document.createElement("div");

div.className="array-box";

div.id=id;

div.innerHTML=subArr.join(" , ");

document.getElementById("visual").appendChild(div);

}

async function findMaxMin(low,high){

let current="box"+Math.random();

drawArray(arr.slice(low,high+1),current);

await sleep(800);

document.getElementById(current)
.classList.add("highlight");

await sleep(700);

if(low==high){

return {
max:arr[low],
min:arr[low]
};

}

if(high==low+1){

let mx=Math.max(arr[low],arr[high]);

let mn=Math.min(arr[low],arr[high]);

return {
max:mx,
min:mn
};

}

let mid=Math.floor((low+high)/2);

let left=
await findMaxMin(low,mid);

let right=
await findMaxMin(mid+1,high);

return{

max:Math.max(
left.max,
right.max
),

min:Math.min(
left.min,
right.min
)

};

}


async function start(){

document.getElementById("visual")
.innerHTML="";

document.getElementById("result")
.innerHTML="";

let ans=
await findMaxMin(
0,
arr.length-1
);

document.getElementById("result")
.innerHTML=

"Maximum = "
+ans.max+
"<br>Minimum = "
+ans.min;

}

</script>

</body>

</html>
